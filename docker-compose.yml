services:
  postgres:
    image: postgres:16-alpine
    container_name: hotems-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: hotems
      POSTGRES_PASSWORD: hotems
      POSTGRES_DB: hotems
    ports:
      - "5433:5432"
    volumes:
      - hotems_pgdata:/var/lib/postgresql/data

volumes:
  hotems_pgdata:
